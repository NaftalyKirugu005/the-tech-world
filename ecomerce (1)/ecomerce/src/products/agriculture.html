<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AgriSupplies Kenya • Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="mb-4 text-center">🌾 AgriSupplies Kenya</h1>
    <div class="row">
        <div th:each="product : ${products}" class="col-md-4 mb-4">
            <div class="card h-100 shadow-sm">
                <img th:src="${product.imageUrl}" class="card-img-top" style="height: 220px; object-fit: cover;" alt="">
                <div class="card-body">
                    <h5 class="card-title" th:text="${product.name}"></h5>
                    <p class="card-text" th:text="${product.description}"></p>
                    <p><strong>Category:</strong> <span th:text="${product.category}"></span></p>
                    <p class="fs-4 fw-bold">KES <span th:text="${product.price}"></span></p>
                    <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post" class="d-flex gap-2">
                        <input type="number" name="quantity" value="1" min="1" th:max="${product.stock > 0 ? product.stock : ''}" class="form-control" style="width:80px;">
                        <button type="submit" class="btn btn-success flex-grow-1">Add to Cart 🛒</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <a href="/cart" class="btn btn-primary btn-lg mt-4">View Cart →</a>
</div>
</body>
</html>
