<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Your Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="mb-4">🛒 Your Shopping Cart</h1>
    <table class="table table-hover align-middle">
        <thead>
        <tr>
            <th>Picture</th>
            <th>Item</th>
            <th>Qty</th>
            <th>Unit Price</th>
            <th>Subtotal</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${cartItems}">
            <td><img th:src="${item.product.imageUrl}" style="width:80px; height:80px; object-fit:cover;" alt=""></td>
            <td th:text="${item.product.name}"></td>
            <td th:text="${item.quantity}"></td>
            <td>KES <span th:text="${item.product.price}"></span></td>
            <td>KES <span th:text="${item.product.price * item.quantity}"></span></td>
        </tr>
        </tbody>
    </table>

    <h3 class="text-end">Total: KES <span th:text="${total}" class="text-success"></span></h3>

    <div class="d-flex justify-content-between mt-4">
        <a href="/" class="btn btn-secondary">← Continue Shopping</a>
        <form action="/cart/clear" method="post">
            <button type="submit" class="btn btn-danger">Clear Cart</button>
        </form>
        <!-- You can add real checkout button here later (M-Pesa, etc.) -->
        <button class="btn btn-success btn-lg">Proceed to Checkout</button>
    </div>
</div>
</body>
</html>
